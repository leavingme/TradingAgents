<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TradingAgents &mdash; AI Market Intelligence</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <link rel="stylesheet" href="/static/styles.css?v=20260706-report-tabs" />
  </head>
  <body>
    <!-- Ambient background orbs -->
    <div class="bg-orb bg-orb-1" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-2" aria-hidden="true"></div>
    <div class="bg-orb bg-orb-3" aria-hidden="true"></div>

    <main class="shell">
      <section class="workspace">

        <!-- Top bar -->
        <header class="topbar">
          <div class="brand">
            <div class="brand-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                <polyline points="16 7 22 7 22 13"></polyline>
              </svg>
            </div>
            <div>
              <h1>TradingAgents</h1>
              <p class="brand-tagline" data-i18n="brandTagline">AI-powered market intelligence</p>
            </div>
          </div>
          <div class="topbar-right">
            <nav class="view-nav" aria-label="Primary">
              <button id="runViewButton" type="button" class="view-tab active" data-i18n="navRun">Run</button>
              <button id="settingsViewButton" type="button" class="view-tab" data-i18n="navSettings">Settings</button>
            </nav>
            <div class="status-pill">
              <span class="status-dot" id="statusDot"></span>
              <span id="runStatus" data-i18n="statusReady">Ready</span>
            </div>
            <div class="run-meta">
              <span class="meta-chip">
                <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm0 1a6 6 0 1 1 0 12A6 6 0 0 1 8 2zm-.5 3v3.22l2.64 1.57.5-.86-2.14-1.27V5H7.5z"/></svg>
                <span id="runId" data-i18n="noRun">No run</span>
              </span>
              <span class="meta-chip">
                <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M6 1a1 1 0 0 0 0 2h4a1 1 0 0 0 0-2H6zM3 4a2 2 0 0 0-2 2v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H3zm0 1h10a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/></svg>
                <span id="eventCount">0 events</span>
              </span>
            </div>
          </div>
        </header>

        <!-- Control band (run form) -->
        <section id="runControls" class="control-band" aria-label="Run controls">
          <form id="runForm" class="run-form">

            <label class="form-field field-symbol">
              <span class="field-label" data-i18n="ticker">Ticker</span>
              <select id="ticker" name="ticker" required>
                <option value="NVDA" selected>NVDA · NVIDIA</option>
                <option value="AAPL">AAPL · Apple</option>
                <option value="MSFT">MSFT · Microsoft</option>
                <option value="GOOGL">GOOGL · Alphabet</option>
                <option value="AMZN">AMZN · Amazon</option>
                <option value="META">META · Meta</option>
                <option value="TSLA">TSLA · Tesla</option>
                <option value="AMD">AMD · Advanced Micro Devices</option>
                <option value="AVGO">AVGO · Broadcom</option>
                <option value="SPY">SPY · S&P 500 ETF</option>
                <option value="QQQ">QQQ · Nasdaq 100 ETF</option>
                <option value="0700.HK">0700.HK · Tencent</option>
                <option value="9988.HK">9988.HK · Alibaba HK</option>
                <option value="BTC-USD">BTC-USD · Bitcoin</option>
                <option value="ETH-USD">ETH-USD · Ethereum</option>
              </select>
            </label>

            <label class="form-field field-date">
              <span class="field-label" data-i18n="analysisDate">Analysis Date</span>
              <input
                id="analysisDate"
                name="analysisDate"
                type="date"
                required
              />
            </label>

            <label class="form-field field-asset">
              <span class="field-label" data-i18n="assetType">Asset Type</span>
              <select id="assetType" name="assetType">
                <option value="stock" data-i18n="assetStock">Stock</option>
                <option value="crypto" data-i18n="assetCrypto">Crypto</option>
              </select>
            </label>

            <fieldset class="analysts-fieldset">
              <legend class="field-label" data-i18n="analysts">Analysts</legend>
              <label class="analyst-chip">
                <input type="checkbox" name="analysts" value="market" checked />
                <span data-i18n="analystMarket">Market</span>
              </label>
              <label class="analyst-chip">
                <input type="checkbox" name="analysts" value="social" checked />
                <span data-i18n="analystSocial">Social</span>
              </label>
              <label class="analyst-chip">
                <input type="checkbox" name="analysts" value="news" checked />
                <span data-i18n="analystNews">News</span>
              </label>
              <label class="analyst-chip">
                <input type="checkbox" name="analysts" value="fundamentals" checked />
                <span data-i18n="analystFundamentals">Fundamentals</span>
              </label>
            </fieldset>

            <div class="form-actions">
              <button id="startButton" type="submit" class="btn-primary">
                <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4 3.5a.5.5 0 0 1 .763-.424l8 4.5a.5.5 0 0 1 0 .848l-8 4.5A.5.5 0 0 1 4 12.5v-9z"/></svg>
                <span data-i18n="startAnalysis">Start Analysis</span>
              </button>
              <button id="cancelButton" type="button" class="btn-secondary" disabled>
                <svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/></svg>
                <span data-i18n="cancel">Cancel</span>
              </button>
            </div>

          </form>
        </section>

        <section id="settingsView" class="settings-view hidden" aria-label="Run settings" hidden>
          <form id="settingsForm" class="settings-form">
            <div class="settings-header">
              <div>
                <h2 data-i18n="settingsTitle">Run Settings</h2>
                <p data-i18n="settingsSubtitle">Defaults used when starting a new analysis run.</p>
              </div>
              <button id="resetSettings" type="button" class="btn-secondary" data-i18n="resetDefaults">Reset Defaults</button>
            </div>

            <div class="settings-grid">
              <label class="form-field">
                <span class="field-label" data-i18n="uiLanguage">UI Language</span>
                <select id="uiLanguage" name="uiLanguage">
                  <option value="auto" data-i18n="uiLanguageAuto">Auto</option>
                  <option value="en">English</option>
                  <option value="zh">中文</option>
                </select>
              </label>

              <label class="form-field">
                <span class="field-label" data-i18n="reportLanguage">Report Language</span>
                <select id="outputLanguage" name="outputLanguage">
                  <option value="Chinese" selected>Chinese · 中文</option>
                  <option value="English">English</option>
                  <option value="Japanese">Japanese · 日本語</option>
                  <option value="Korean">Korean · 한국어</option>
                  <option value="Spanish">Spanish · Español</option>
                  <option value="French">French · Français</option>
                  <option value="German">German · Deutsch</option>
                </select>
              </label>

              <label class="form-field">
                <span class="field-label" data-i18n="analysisDepth">Analysis Depth</span>
                <select
                  id="researchDepth"
                  name="researchDepth"
                >
                  <option value="1" selected data-i18n="depthShallow">Shallow · quick research</option>
                  <option value="3" data-i18n="depthMedium">Medium · moderate debate</option>
                  <option value="5" data-i18n="depthDeep">Deep · comprehensive research</option>
                </select>
              </label>

              <label class="form-field">
                <span class="field-label" data-i18n="llmProvider">LLM Provider</span>
                <select id="llmProvider" name="llmProvider">
                  <option value="minimax-cn" selected>MiniMax · China</option>
                  <option value="minimax">MiniMax · Global</option>
                  <option value="openai">OpenAI</option>
                  <option value="anthropic">Anthropic</option>
                  <option value="google">Google</option>
                  <option value="qwen-cn">Qwen · China</option>
                  <option value="openrouter">OpenRouter</option>
                  <option value="openai_compatible">OpenAI-compatible</option>
                </select>
              </label>

              <label class="form-field">
                <span class="field-label" data-i18n="quickModel">Quick Model</span>
                <input
                  id="quickThinkLlm"
                  name="quickThinkLlm"
                  type="text"
                  value="MiniMax-M3"
                  autocomplete="off"
                />
              </label>

              <label class="form-field">
                <span class="field-label" data-i18n="deepModel">Deep Model</span>
                <input
                  id="deepThinkLlm"
                  name="deepThinkLlm"
                  type="text"
                  value="MiniMax-M3"
                  autocomplete="off"
                />
              </label>

              <label class="form-field">
                <span class="field-label" data-i18n="backendUrl">Backend URL</span>
                <input
                  id="backendUrl"
                  name="backendUrl"
                  type="url"
                  placeholder="Provider default"
                  data-i18n-placeholder="providerDefault"
                  autocomplete="off"
                />
              </label>
            </div>
          </form>
        </section>

        <!-- Main dashboard -->
        <section id="runView" class="dashboard">

          <!-- Left panel: Agents + History -->
          <section class="panel agents-panel" aria-label="Agent timeline">
            <div class="panel-header">
              <div class="panel-title">
                <svg class="panel-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                  <path d="M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM8 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm.256 7a4.474 4.474 0 0 1-.229-1.004H3c.001-.246.154-.986.832-1.664C4.484 10.68 5.711 10 8 10c.26 0 .507.009.74.025.226-.341.496-.65.804-.918C9.077 9.038 8.564 9 8 9c-5 0-6 3-6 4s1 1 1 1h5.256z"/>
                  <path d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7zm.5-5v1h1a.5.5 0 0 1 0 1h-1v1a.5.5 0 0 1-1 0v-1h-1a.5.5 0 0 1 0-1h1v-1a.5.5 0 0 1 1 0z"/>
                </svg>
                <span data-i18n="agentTimeline">Agent Timeline</span>
              </div>
            </div>
            <ol id="agentList" class="agent-list"></ol>

            <div class="panel-divider"></div>

            <div class="history-head">
              <div class="panel-title">
                <svg class="panel-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                  <path d="M8.515 1.019A7 7 0 0 0 8 1V0a8 8 0 0 1 .589.022l-.074.997zm2.004.45a7.003 7.003 0 0 0-.985-.299l.219-.976c.383.086.76.2 1.126.342l-.36.933zm1.37.71a7.01 7.01 0 0 0-.439-.27l.493-.87a8.025 8.025 0 0 1 .979.654l-.615.789a6.996 6.996 0 0 0-.418-.203zm1.834 1.79a6.99 6.99 0 0 0-.653-.796l.724-.69c.27.285.52.59.747.91l-.818.576zm.744 1.352a7.08 7.08 0 0 0-.214-.468l.893-.45a7.976 7.976 0 0 1 .45 1.088l-.95.313a7.023 7.023 0 0 0-.179-.483zm.53 2.507a6.991 6.991 0 0 0-.1-1.025l.985-.17c.067.386.106.778.116 1.17l-1 .025zm-.131 1.538c.033-.17.06-.339.081-.51l.993.123a7.957 7.957 0 0 1-.23 1.155l-.964-.267c.046-.165.086-.332.12-.501zm-.952 2.379c.184-.29.346-.594.486-.908l.914.405c-.16.36-.345.706-.555 1.038l-.845-.535zm-.964 1.205c.122-.122.239-.248.35-.378l.758.653a8.073 8.073 0 0 1-.401.432l-.707-.707z"/>
                  <path d="M8 1a7 7 0 1 0 4.95 11.95l.707.707A8.001 8.001 0 1 1 8 0v1z"/>
                  <path d="M7.5 3a.5.5 0 0 1 .5.5v5.21l3.248 1.856a.5.5 0 0 1-.496.868l-3.5-2A.5.5 0 0 1 7 9V3.5a.5.5 0 0 1 .5-.5z"/>
                </svg>
                <span data-i18n="runHistory">Run History</span>
              </div>
              <button id="refreshHistory" type="button" class="btn-icon" title="Refresh history" data-i18n-title="refreshHistory">
                <svg viewBox="0 0 16 16" fill="currentColor">
                  <path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/>
                  <path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3zM3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9H3.1z"/>
                </svg>
              </button>
            </div>
            <ol id="historyList" class="history-list"></ol>
          </section>

          <!-- Center panel: Live event stream -->
          <section class="panel stream-panel" aria-label="Live event stream">
            <div class="panel-header">
              <div class="panel-title">
                <svg class="panel-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                  <path d="M0 4s0-2 2-2 2 2 2 2v6s0 2-2 2-2-2-2-2V4zm6 0s0-2 2-2 2 2 2 2v6s0 2-2 2-2-2-2-2V4zm6 0s0-2 2-2 2 2 2 2v6s0 2-2 2-2-2-2-2V4z"/>
                </svg>
                <span data-i18n="liveStream">Live Stream</span>
              </div>
              <button id="clearLog" type="button" class="btn-icon" title="Clear log" data-i18n-title="clearLog">
                <svg viewBox="0 0 16 16" fill="currentColor">
                  <path d="M11 1.5v1h3.5a.5.5 0 0 1 0 1h-.538l-.853 10.66A2 2 0 0 1 11.115 16h-6.23a2 2 0 0 1-1.994-1.84L2.038 3.5H1.5a.5.5 0 0 1 0-1H5v-1A1.5 1.5 0 0 1 6.5 0h3A1.5 1.5 0 0 1 11 1.5zm-5 0v1h4v-1a.5.5 0 0 0-.5-.5h-3a.5.5 0 0 0-.5.5zM4.5 5.029l.5 8.5a.5.5 0 1 0 .998-.06l-.5-8.5a.5.5 0 1 0-.998.06zm6.53-.528a.5.5 0 0 0-.528.47l-.5 8.5a.5.5 0 0 0 .998.058l.5-8.5a.5.5 0 0 0-.47-.528zM8 4.5a.5.5 0 0 0-.5.5v8.5a.5.5 0 0 0 1 0V5a.5.5 0 0 0-.5-.5z"/>
                </svg>
              </button>
            </div>
            <div id="eventLog" class="event-log"></div>
          </section>

          <!-- Right panel: Report viewer -->
          <section class="panel report-panel" aria-label="Report viewer">
            <div class="panel-header">
              <div class="panel-title">
                <svg class="panel-icon" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                  <path d="M14 4.5V14a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h5.5L14 4.5zm-3 0A1.5 1.5 0 0 1 9.5 3V1H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1V4.5h-2z"/>
                </svg>
                <span data-i18n="analysisReport">Analysis Report</span>
              </div>
              <div class="report-tools">
                <select id="reportSectionSelect" class="report-section-select" disabled title="Report section" data-i18n-title="reportSection">
                  <option value="all" data-i18n="reportAll">All</option>
                </select>
                <button id="loadReport" type="button" class="btn-icon" disabled title="Load report" data-i18n-title="loadReport">
                  <svg viewBox="0 0 16 16" fill="currentColor">
                    <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
                    <path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/>
                  </svg>
                </button>
              </div>
            </div>
            <div id="reportViewer" class="report-viewer"></div>
          </section>

        </section>
      </section>
    </main>

    <script src="/static/app.js?v=20260706-report-tabs" type="module"></script>
  </body>
</html>
